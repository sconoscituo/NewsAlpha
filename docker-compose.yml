version: "3.9"

services:
  newsalpha:
    build: .
    container_name: newsalpha_app
    ports:
      - "8000:8000"
    volumes:
      # 데이터베이스 파일 영속성 유지
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/newsalpha.db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  newsalpha_data:
