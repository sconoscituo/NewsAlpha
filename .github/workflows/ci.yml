name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: 테스트 실행
        env:
          GEMINI_API_KEY: "test_key"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "test_secret_key_for_ci"
          TELEGRAM_BOT_TOKEN: ""
          DEBUG: "True"
        run: pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: flake8 설치
        run: pip install flake8

      - name: 린트 검사
        run: flake8 app/ tests/ --max-line-length=120 --ignore=E501,W503
